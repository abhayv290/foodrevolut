# docker/nginx/nginx.conf
# Static and media files served from S3 — Nginx only proxies requests

upstream django {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    # ── WebSocket connections ─────────────────────────────────────────────────
    location /ws/ {
        proxy_pass         http://django;
        proxy_http_version 1.1;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_read_timeout  86400s;
        proxy_send_timeout  86400s;
    }

    # ── All other requests → Django ───────────────────────────────────────────
    # Static files → served from S3 (browser fetches directly from S3 URL)
    # Media files  → served from S3 (browser fetches directly from S3 URL)
    # API requests → proxied to Daphne
    location / {
        proxy_pass          http://django;
        proxy_http_version  1.1;

        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        client_max_body_size 10M;

        proxy_connect_timeout  60s;
        proxy_read_timeout     60s;
    }
}